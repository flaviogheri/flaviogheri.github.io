<!-- Decorative drop-cap: replace the first letter of the page's first
     paragraph with the matching illustrated initial in /images/letters/. -->
<script>
(function () {
  function addDropCap() {
    // Decorative initial only on the home page — it doesn't suit the
    // denser project/article pages.
    var p = document.querySelector('.home-intro');
    if (!p || p.querySelector('.dropcap-letter')) return;

    var walker = document.createTreeWalker(p, NodeFilter.SHOW_TEXT, null);
    var node = walker.nextNode();
    while (node && !node.textContent.trim()) { node = walker.nextNode(); }
    if (!node) return;

    var text = node.textContent;
    var i = 0;
    while (i < text.length && /\s/.test(text.charAt(i))) { i++; }
    var ch = text.charAt(i);
    if (!/[a-zA-Z]/.test(ch)) return;

    node.textContent = text.slice(0, i) + text.slice(i + 1);

    var lower = ch.toLowerCase();
    var img = document.createElement('img');
    img.className = 'dropcap-letter';
    img.alt = ch;
    img.src = '/images/letters/letter_' + lower + '.svg';
    img.addEventListener('error', function onErr() {
      img.removeEventListener('error', onErr);
      img.src = '/images/letters/letter_' + lower + '.png';
    });

    node.parentNode.insertBefore(img, node);
    p.classList.add('has-dropcap');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', addDropCap);
  } else {
    addDropCap();
  }
})();
</script>
<!-- end custom footer snippets -->
